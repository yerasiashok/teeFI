version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: teefi-postgres
    environment:
      POSTGRES_DB:       teefi
      POSTGRES_USER:     teefi_user
      POSTGRES_PASSWORD: teefi_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teefi_user -d teefi"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: teefi-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: teefi-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: teefi-kafka
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: teefi-backend
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      kafka:    { condition: service_healthy }
    ports:
      - "8080:8080"
    environment:
      DB_HOST:                  postgres
      DB_PORT:                  5432
      DB_NAME:                  teefi
      DB_USERNAME:              teefi_user
      DB_PASSWORD:              teefi_pass
      REDIS_HOST:               redis
      KAFKA_SERVERS:            kafka:9092
      JWT_SECRET:               ${JWT_SECRET:-change-me-in-production-long-secret}
      RAZORPAY_KEY_ID:          ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET:      ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET:  ${RAZORPAY_WEBHOOK_SECRET:-}
      STRIPE_SECRET_KEY:        ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET:    ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PUBLISHABLE_KEY:   ${STRIPE_PUBLISHABLE_KEY:-}
      PRINTFUL_API_KEY:         ${PRINTFUL_API_KEY:-}
      AWS_REGION:               ${AWS_REGION:-ap-south-1}
      S3_BUCKET:                ${S3_BUCKET:-teefi-assets}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: teefi-frontend
    depends_on: [backend]
    ports:
      - "5173:80"

volumes:
  postgres_data:
